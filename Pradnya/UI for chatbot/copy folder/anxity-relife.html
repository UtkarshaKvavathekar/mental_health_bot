<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anxiety & Stress Breathing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #E0F2F1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background: #E0F2F1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .title {
            position: absolute;
            top: 10%;
            font-size: 2.5rem;
            font-weight: 600;
            color: #26A69A;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .breathing-circle-container {
            position: relative;
            width: 65vh;
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-background {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .circle-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circle-track {
            fill: none;
            stroke: #B2DFDB;
            stroke-width: 30;
            opacity: 0.3;
        }

        .circle-progress {
            fill: none;
            stroke: #26A69A;
            stroke-width: 30;
            stroke-linecap: round;
            transition: stroke 0.3s ease;
        }

        .phase-text {
            position: absolute;
            font-size: 3.5rem;
            font-weight: 300;
            color: #26A69A;
            text-transform: uppercase;
            letter-spacing: 6px;
        }

        .timeline {
            position: absolute;
            bottom: 12%;
            font-size: 1.2rem;
            font-weight: 400;
            color: #26A69A;
            letter-spacing: 2px;
        }

        .timeline span {
            margin: 0 8px;
        }

        .timeline .active {
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">ANXIETY & STRESS</div>
        
        <div class="breathing-circle-container">
            <svg class="circle-svg" viewBox="0 0 200 200">
                <circle class="circle-track" cx="100" cy="100" r="85"></circle>
                <circle class="circle-progress" id="progressCircle" cx="100" cy="100" r="85"></circle>
            </svg>
            <div class="phase-text" id="phaseText">INHALE</div>
        </div>
        
        <div class="timeline">
            <span id="phase1" class="active">4s INHALE</span> |
            <span id="phase2">4s HOLD</span> |
            <span id="phase3">6s EXHALE</span> |
            <span id="phase4">2s HOLD</span>
        </div>
    </div>

    <script>
        const phaseText = document.getElementById('phaseText');
        const progressCircle = document.getElementById('progressCircle');
        
        const radius = 85;
        const circumference = 2 * Math.PI * radius;
        progressCircle.style.strokeDasharray = circumference;
        
        const phases = [
            { text: 'INHALE', duration: 4, color: '#26A69A', timeline: 'phase1' },
            { text: 'HOLD', duration: 4, color: '#26A69A', timeline: 'phase2' },
            { text: 'EXHALE', duration: 6, color: '#80CBC4', timeline: 'phase3' },
            { text: 'HOLD', duration: 2, color: '#26A69A', timeline: 'phase4' }
        ];
        
        let currentPhase = 0;
        let startTime = null;
        let animationFrameId = null;
        
        function updateTimeline(activeIndex) {
            for (let i = 1; i <= 4; i++) {
                const element = document.getElementById('phase' + i);
                element.classList.remove('active');
            }
            document.getElementById(phases[activeIndex].timeline).classList.add('active');
        }
        
        function animatePhase(timestamp) {
            const phase = phases[currentPhase];
            
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1000;
            const progress = Math.min(elapsed / phase.duration, 1);
            
            const offset = circumference * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;
            
            if (progress < 1) {
                animationFrameId = requestAnimationFrame(animatePhase);
            } else {
                currentPhase = (currentPhase + 1) % phases.length;
                startPhase();
            }
        }
        
        function startPhase() {
            const phase = phases[currentPhase];
            phaseText.textContent = phase.text;
            progressCircle.style.stroke = phase.color;
            
            updateTimeline(currentPhase);
            
            startTime = null;
            progressCircle.style.strokeDashoffset = circumference;
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            animationFrameId = requestAnimationFrame(animatePhase);
        }
        
        startPhase();
    </script>
</body>
</html>
