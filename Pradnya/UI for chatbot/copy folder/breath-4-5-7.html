<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Technique Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, 
                #E0F2F1 0%,
                #B2DFDB 50%,
                #80CBC4 100%
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                background: linear-gradient(135deg, 
                    #E0F2F1 0%,
                    #B2DFDB 50%,
                    #80CBC4 100%
                );
            }
            50% {
                background: linear-gradient(135deg, 
                    #B2DFDB 0%,
                    #80CBC4 50%,
                    #E0F2F1 100%
                );
            }
        }

        .ambient-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, 
                rgba(38, 166, 154, 0.2) 0%,
                transparent 50%
            ),
            radial-gradient(ellipse at 70% 60%, 
                rgba(178, 223, 219, 0.3) 0%,
                transparent 50%
            );
            filter: blur(80px);
            animation: glowPulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.1); }
        }

        .header {
            position: absolute;
            top: 15%;
            font-size: 2rem;
            font-weight: 300;
            color: rgba(3, 35, 32, 0.6);
            letter-spacing: 3px;
            text-transform: lowercase;
        }

        .breathing-container {
            position: relative;
            width: 70vh;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .outer-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .inner-circle {
            position: absolute;
            width: 55%;
            height: 55%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .instruction-text {
            font-size: 1.8rem;
            font-weight: 300;
            color: #26A69A;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .counter {
            font-size: 4rem;
            font-weight: 200;
            color: #26A69A;
        }

        .progress-text {
            position: absolute;
            bottom: 20%;
            font-size: 1.5rem;
            font-weight: 300;
            color: rgba(3, 21, 19, 0.6);
            letter-spacing: 6px;
        }

        .technique-text {
            position: absolute;
            bottom: 13%;
            font-size: 1.3rem;
            font-weight: 300;
            color: rgba(3, 26, 23, 0.6);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .breathing-container.inhale .outer-circle {
            transform: scale(1.15);
            border-color: rgba(38, 166, 154, 0.6);
        }

        .breathing-container.inhale .inner-circle {
            transform: scale(1.2);
            border-color: rgba(38, 166, 154, 0.7);
        }

        .breathing-container.hold .outer-circle {
            border-color: rgba(128, 203, 196, 0.6);
        }

        .breathing-container.hold .inner-circle {
            border-color: rgba(128, 203, 196, 0.7);
        }

        .breathing-container.exhale .outer-circle {
            transform: scale(0.85);
            border-color: rgba(178, 223, 219, 0.5);
        }

        .breathing-container.exhale .inner-circle {
            transform: scale(0.8);
            border-color: rgba(178, 223, 219, 0.6);
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0;
            pointer-events: none;
            animation: expandFade 3s ease-out infinite;
        }

        @keyframes expandFade {
            0% {
                width: 100%;
                height: 100%;
                opacity: 0.5;
            }
            100% {
                width: 130%;
                height: 130%;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ambient-glow"></div>
        
        <div class="header">Clam Down</div>
        
        <div class="breathing-container" id="breathingContainer">
            <div class="outer-circle"></div>
            <div class="pulse-ring" style="animation-delay: 0s;"></div>
            <div class="pulse-ring" style="animation-delay: 1s;"></div>
            <div class="pulse-ring" style="animation-delay: 2s;"></div>
            <div class="inner-circle">
                <div class="instruction-text" id="instructionText">INHALE</div>
                <div class="counter" id="counter">4</div>
            </div>
        </div>
        
        <div class="progress-text" id="progressText">4 / 7 / 8</div>
        <div class="technique-text">BREATHING TECHNIQUE</div>
    </div>

    <script>
        const container = document.getElementById('breathingContainer');
        const instructionText = document.getElementById('instructionText');
        const counter = document.getElementById('counter');
        
        const phases = [
            { name: 'INHALE', duration: 4, class: 'inhale' },
            { name: 'HOLD', duration: 7, class: 'hold' },
            { name: 'EXHALE', duration: 8, class: 'exhale' }
        ];
        
        let currentPhaseIndex = 0;
        let currentCount = 4;
        let countdownInterval;
        
        function startPhase() {
            const phase = phases[currentPhaseIndex];
            currentCount = phase.duration;
            
            container.className = 'breathing-container ' + phase.class;
            instructionText.textContent = phase.name;
            counter.textContent = currentCount;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                currentCount--;
                counter.textContent = currentCount;
                
                if (currentCount <= 0) {
                    clearInterval(countdownInterval);
                    currentPhaseIndex = (currentPhaseIndex + 1) % phases.length;
                    setTimeout(startPhase, 500);
                }
            }, 1000);
        }
        
        startPhase();
    </script>
</body>
</html>
