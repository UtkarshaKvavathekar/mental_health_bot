<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serene - Mental Health Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-bg">
    <div class="header">
        <div class="logo-container">
            <div class="logo">S</div>
            <div class="brand-name">Mega Bot</div>
        </div>
        <div class="toggle-switch">
            <button class="toggle-btn active" id="chatToggle">Chat</button>
            <button class="toggle-btn" id="reliefToggle">Quick Relief</button>
        </div>
    </div>

    <div class="container" id="chatSection">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div>
                        <div class="message-content">
                            Hello there, dear one. I'm Mega Bot...
                        </div>
                        <div class="read-aloud">
                            <span>🔊</span><span>Read Aloud</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" class="message-input" placeholder="Type your feelings here..." id="messageInput">
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="container relief-container hidden" id="reliefSection">
        <h1 class="relief-title">How can I help you right now?</h1>
        <div class="cards-grid">
            <div class="relief-card blue" data-technique="breathing" data-file="../static/exercises/breath-4-5-7.html">
                <div class="card-icon">😮‍💨</div>
                <div class="card-title">4-7-8 Breathing</div>
            </div>
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
