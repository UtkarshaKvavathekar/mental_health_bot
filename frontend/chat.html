<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serene | Chat</title>

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <link rel="icon" href="data:," />
  </head>

  <body class="chat-page">
    <div class="chat-shell">
      <!-- SIDEBAR -->
      <aside class="chat-sidebar" id="chatSidebar">
        <div class="sidebar-top">
          <button id="newChatBtn" class="new-chat-btn">+ New chat</button>
        </div>

        <div id="chatHistory" class="chat-history"></div>
      </aside>

      <!-- MAIN -->
      <main class="chat-main">
        <header class="chat-header">
          <button class="menu-btn" id="menuBtn">☰</button>
          <div class="chat-header-title">Serene Assistant</div>
        </header>

        <section id="chatMessages" class="chat-messages"></section>

        <footer class="chat-footer">
          <div class="input-wrapper">
            <input
              id="messageInput"
              class="message-input"
              type="text"
              placeholder="Message Serene..."
              autocomplete="off"
            />

            <button id="sendBtn" class="send-btn">➤</button>
          </div>
        </footer>
      </main>
    </div>

    <script src="script/navbar.js"></script>
    <script src="script/chat.js?v=704"></script>
  </body>
</html>
