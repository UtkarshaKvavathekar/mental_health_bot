<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg,#eef2ff,#f8fafc);
      min-height:100vh;
    }

    .profile-card{
      max-width:500px;
      margin:auto;
      border-radius:20px;
      box-shadow:0 20px 40px rgba(0,0,0,0.08);
      padding:40px;
      background:white;
    }

    .avatar-wrapper{
      position:relative;
      width:130px;
      height:130px;
      margin:auto;
    }

    .avatar{
      width:130px;
      height:130px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #6366f1;
    }

    .upload-btn{
      position:absolute;
      bottom:0;
      right:0;
      background:#6366f1;
      color:white;
      border-radius:50%;
      width:35px;
      height:35px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:14px;
    }

    input[type="file"]{
      display:none;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand text-white" href="home.html">YourAppName</a>
</nav>

<div class="container mt-5">
  <div class="profile-card text-center">

    <h3 class="mb-4">Profile</h3>

    <!-- Avatar -->
    <div class="avatar-wrapper mb-4">
      <img id="profileImage" class="avatar">
      <label class="upload-btn">
        ✎
        <input type="file" id="imageUpload" accept="image/*">
      </label>
    </div>

    <!-- Name -->
    <div class="mb-3">
      <input type="text" id="userName" class="form-control text-center" placeholder="Enter your name">
    </div>

    <button onclick="saveName()" class="btn btn-primary w-100">
      Save Changes
    </button>

  </div>
</div>

<script>

// Default Avatar (SVG fallback)
const defaultAvatar =
"data:image/svg+xml;base64," +
btoa(`
<svg xmlns='http://www.w3.org/2000/svg' width='130' height='130'>
<rect width='100%' height='100%' fill='#ddd'/>
<text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='40' fill='#666'>👤</text>
</svg>
`);

// Load profile
let profile = JSON.parse(localStorage.getItem("userProfile")) || {};

const imageElement = document.getElementById("profileImage");
const nameInput = document.getElementById("userName");

// Set initial values
imageElement.src = profile.image || defaultAvatar;
nameInput.value = profile.name || "";

// Upload Image
document.getElementById("imageUpload").addEventListener("change", function(event){

  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    imageElement.src = e.target.result;

    // Save immediately to localStorage
    profile.image = e.target.result;
    localStorage.setItem("userProfile", JSON.stringify(profile));
  };

  reader.readAsDataURL(file);
});

// Save Name
function saveName(){
  profile.name = nameInput.value;
  localStorage.setItem("userProfile", JSON.stringify(profile));
  alert("Profile Updated ✅");
}

</script>

</body>
</html>
