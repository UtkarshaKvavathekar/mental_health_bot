<!DOCTYPE html>
<html>
<head>
  <title>Reflection Timeline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg,#f8fafc,#e0f2fe);
      min-height:100vh;
    }

    .timeline-card{
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      padding:20px;
      margin-bottom:20px;
      background:white;
    }

    .mood-badge{
      font-weight:600;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand text-white" href="home.html">YourAppName</a>
  <div class="ms-auto">
    <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
  </div>
</nav>

<div class="container mt-5">

  <h3 class="mb-4">Reflection Timeline</h3>

  <div id="timelineContainer"></div>

</div>

<script>

function getMoodText(level){
  const moods = {
    1:"Low 😡",
    2:"Sad 😔",
    3:"Neutral 😐",
    4:"Good 🙂",
    5:"Calm 😌"
  };
  return moods[level] || "Unknown";
}

// Get full history
let history = JSON.parse(localStorage.getItem("checkinHistory")) || [];
let latest = JSON.parse(localStorage.getItem("latestCheckin"));

// Add latest into history if not already saved
if(latest){
  history.push(latest);
  localStorage.setItem("checkinHistory", JSON.stringify(history));
  localStorage.removeItem("latestCheckin");
}

let container = document.getElementById("timelineContainer");

if(history.length === 0){
  container.innerHTML = "<p>No reflections yet. Complete a check-in.</p>";
}else{

  history.reverse().forEach(entry => {

    let date = new Date(entry.date).toDateString();

    let card = document.createElement("div");
    card.className = "timeline-card";

    card.innerHTML = `
      <strong>${date}</strong><br>
      <span class="mood-badge">Mood: ${getMoodText(entry.mood)}</span><br>
      ${entry.note ? `<p class="mt-2"><strong>Reflection:</strong> ${entry.note}</p>` : ""}
    `;

    container.appendChild(card);
  });
}

</script>

</body>
</html>
