<!DOCTYPE html>
<html>
<head>
  <title>Achievements</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg,#fef9c3,#f3e8ff);
      min-height:100vh;
    }

    .badge-card{
      border-radius:16px;
      padding:20px;
      text-align:center;
      background:white;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .badge-icon{
      font-size:30px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand text-white" href="home.html">YourAppName</a>
  <div class="ms-auto">
    <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
  </div>
</nav>

<div class="container mt-5">

  <h3 class="mb-4">Achievements</h3>

  <!-- Badge Grid -->
  <div class="row g-4 mb-5">

    <div class="col-md-4">
      <div class="badge-card">
        <div class="badge-icon">🔥</div>
        <h6>Streak</h6>
        <p id="streakValue"></p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="badge-card">
        <div class="badge-icon">📊</div>
        <h6>Mood Tracker</h6>
        <p id="moodValue"></p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="badge-card">
        <div class="badge-icon">🏃</div>
        <h6>Exercise</h6>
        <p id="exerciseValue"></p>
      </div>
    </div>

  </div>

  <!-- Progress Bar -->
  <h6>Exercise Consistency</h6>
  <div class="progress">
    <div id="exerciseBar" class="progress-bar bg-success" style="width:0%"></div>
  </div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("checkinHistory")) || [];
let streak = localStorage.getItem("streak") || 0;

document.getElementById("streakValue").innerText = streak + " Days 🔥";

document.getElementById("moodValue").innerText =
  history.length + " Entries Logged";

let exerciseCount = history.filter(h => h.exerciseDone).length;
let percentage = history.length ? Math.round((exerciseCount/history.length)*100) : 0;

document.getElementById("exerciseValue").innerText =
  exerciseCount + " Days Completed";

document.getElementById("exerciseBar").style.width = percentage + "%";
document.getElementById("exerciseBar").innerText = percentage + "%";

</script>

</body>
</html>
