<!DOCTYPE html>
<html>
<head>
  <title>Daily Check-in</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg,#e0e7ff,#f3e8ff);
      min-height: 100vh;
    }
    .card {
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }
    .mood span {
      font-size: 30px;
      cursor: pointer;
      margin: 5px;
    }
    .mood span:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand text-white" href="home.html">MindCare</a>
  <div class="ms-auto">
    <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
  </div>
</nav>

<div class="container mt-5">
  <div class="card p-4">
    <h3 class="mb-4">Daily Check-in</h3>

    <!-- Mood -->
    <label class="form-label">Select Your Mood</label>
    <div class="mood mb-3">
      <span onclick="selectMood(1)">😡</span>
      <span onclick="selectMood(2)">😔</span>
      <span onclick="selectMood(3)">😐</span>
      <span onclick="selectMood(4)">🙂</span>
      <span onclick="selectMood(5)">😌</span>
    </div>

    <!-- Stress -->
    <label class="form-label">Stress Level</label>
    <input type="range" min="1" max="10" value="5" id="stressSlider" class="form-range">
    <p>Stress: <span id="stressValue">5</span></p>

    <!-- Exercise -->
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="exerciseCheck">
      <label class="form-check-label">Exercise completed today</label>
    </div>

    <!-- Journal -->
    <label>Notes</label>
    <textarea id="journalNote" class="form-control mb-3" rows="3"></textarea>

    <button onclick="submitCheckin()" class="btn btn-primary w-100">Submit</button>
  </div>
</div>

<script>
let selectedMood = null;
let slider = document.getElementById("stressSlider");
let stressValue = document.getElementById("stressValue");

slider.oninput = function(){
  stressValue.innerText = this.value;
}

function selectMood(level){
  selectedMood = level;
}

/* AUTO STREAK LOGIC */
function updateStreak(){

  let today = new Date().toDateString();
  let lastDate = localStorage.getItem("lastCheckinDate");
  let streak = parseInt(localStorage.getItem("streak")) || 0;

  if(!lastDate){
    streak = 1;
  }else{
    let yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);

    if(lastDate === today){
      return streak; // already counted today
    }
    else if(lastDate === yesterday.toDateString()){
      streak += 1;
    }
    else{
      streak = 1; // reset if missed
    }
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastCheckinDate", today);

  return streak;
}

function submitCheckin(){

  if(selectedMood === null){
    alert("Please select mood 💜");
    return;
  }

  let stress = parseInt(slider.value);
  let exerciseDone = document.getElementById("exerciseCheck").checked;

  let moodScore = (selectedMood / 5) * 50;
  let stressScore = ((10 - stress) / 10) * 30;
  let exerciseScore = exerciseDone ? 20 : 0;

  let wellnessScore = Math.round(moodScore + stressScore + exerciseScore);

  let streak = updateStreak();

  let checkinData = {
    mood: selectedMood,
    stress: stress,
    exerciseDone: exerciseDone,
    note: document.getElementById("journalNote").value,
    wellnessScore: wellnessScore,
    streak: streak,
    date: new Date().toISOString()
  };

  localStorage.setItem("latestCheckin", JSON.stringify(checkinData));

  alert("Check-in submitted 💜");

  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
