<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg,#f1f5f9,#e9d5ff);
      min-height:100vh;
    }

    .settings-card{
      max-width:600px;
      margin:auto;
      border-radius:20px;
      box-shadow:0 20px 40px rgba(0,0,0,0.08);
      padding:40px;
      background:white;
    }

    .section-title{
      font-weight:600;
      margin-top:20px;
    }

    .btn-danger{
      border-radius:12px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand text-white" href="home.html">YourAppName</a>
  <div class="ms-auto">
    <a href="profile.html" class="btn btn-outline-light btn-sm">Profile</a>
  </div>
</nav>

<div class="container mt-5">

  <div class="settings-card">

    <h3 class="mb-4">Account Settings</h3>

    <!-- Notifications -->
    <div>
      <div class="section-title">Notifications</div>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" id="reminderToggle">
        <label class="form-check-label">Daily Check-in Reminder</label>
      </div>
    </div>

    <!-- Privacy -->
    <div>
      <div class="section-title">Privacy</div>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" id="privateAccount">
        <label class="form-check-label">Private Account</label>
      </div>
    </div>

    <!-- Theme -->
    <div>
      <div class="section-title">Theme</div>
      <select id="themeSelect" class="form-select mt-2">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <!-- Logout -->
    <div class="mt-4">
      <button onclick="logout()" class="btn btn-danger w-100">
        Logout
      </button>
    </div>

  </div>

</div>

<script>

let profile = JSON.parse(localStorage.getItem("userProfile")) || {};

document.getElementById("reminderToggle").checked = profile.reminders || false;
document.getElementById("privateAccount").checked = profile.private || false;
document.getElementById("themeSelect").value = profile.theme || "light";

// Save changes automatically
document.getElementById("reminderToggle").addEventListener("change", function(){
  profile.reminders = this.checked;
  localStorage.setItem("userProfile", JSON.stringify(profile));
});

document.getElementById("privateAccount").addEventListener("change", function(){
  profile.private = this.checked;
  localStorage.setItem("userProfile", JSON.stringify(profile));
});

document.getElementById("themeSelect").addEventListener("change", function(){
  profile.theme = this.value;
  localStorage.setItem("userProfile", JSON.stringify(profile));
});

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>
