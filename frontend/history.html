<div class="container">
  <div id="historyLoading">Loading history...</div>
  <div class="card">

    <h2>Your Meditation History</h2>

    <div class="stats">
      <div class="stat-box">
        <p>Total Sessions</p>
        <h3 id="totalSessions">0</h3>
      </div>
      <div class="stat-box">
        <p>Total Minutes</p>
        <h3 id="totalMinutes">0</h3>
      </div>
      <div class="stat-box">
        <p>Current Streak</p>
        <h3 id="streakCount">0</h3>
      </div>
    </div>

    <div id="historyContainer"></div>

    <div class="buttons">
      <button class="dashboard-btn" onclick="goDashboard()">⬅ Back to Dashboard</button>
      <button class="clear-btn" onclick="clearHistory()">🗑 Clear History</button>
    </div>

  </div>
</div>
